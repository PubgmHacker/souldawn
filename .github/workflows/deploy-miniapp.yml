name: Deploy Mini App to GitHub Pages

# Деплоит каталог-миниаппу (bot/miniapp/) на GitHub Pages.
# Минимаппа статичная (HTML/JS), ходит за данными к Next.js API на Railway
# через SITE_URL (пробрасывается ботом через ?site=...).
#
# НАСТРОЙКА (один раз):
#   GitHub → репо → Settings → Pages → Source: "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - 'bot/miniapp/**'
      - '.github/workflows/deploy-miniapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bot/miniapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
